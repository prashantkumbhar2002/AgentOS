<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="agentos-title agentos-desc">
  <title id="agentos-title">AgentOS — Control plane for AI agents</title>
  <desc id="agentos-desc">Hexagonal control-plane kernel surrounded by six agent nodes; one node highlighted in emerald to convey real-time observation. Wordmark "AgentOS" with the suffix "OS" in emerald, followed by a tagline.</desc>

  <!--
    Static brand lockup. Used by external surfaces (link previews, OG images,
    docs sites) where a React component can't be rendered. The in-app source
    of truth is apps/web/src/components/brand/Logo.tsx; keep this file in sync
    when the brand evolves.

    Adapts to OS-level light/dark preference via prefers-color-scheme. Within
    the app the React component is preferred because it can also follow the
    user's explicit theme toggle (apps/web/src/store/useThemeStore).
  -->
  <style>
    .ring-line { stroke: #8b5cf6; stroke-opacity: 0.55; fill: none; }
    .kernel    { fill: #7c3aed; stroke: #7c3aed; }
    .idle      { fill: #8b5cf6; }
    .live      { fill: #10b981; }
    .inner-dot { fill: #ffffff; }
    .word-base { fill: #0a0a0f; }
    .word-os   { fill: #059669; }
    .tagline   { fill: #64748b; }

    @media (prefers-color-scheme: dark) {
      .ring-line { stroke: #a78bfa; stroke-opacity: 0.55; }
      .kernel    { fill: #a78bfa; stroke: #a78bfa; }
      .idle      { fill: #a78bfa; }
      .live      { fill: #34d399; }
      .inner-dot { fill: #0a0a0f; }
      .word-base { fill: #fafafa; }
      .word-os   { fill: #34d399; }
      .tagline   { fill: #94a3b8; }
    }
  </style>

  <!-- ============ ICON: hex network at left ============ -->
  <!-- All coords below are pre-computed from a 64-unit hex space, then
       translated by (24, 36) and uniformly scaled by 2 to produce a 128px-tall
       mark inside the 200px-tall canvas. The geometry matches Logo.tsx. -->
  <g transform="translate(24 36) scale(2)">
    <!-- Connector lines -->
    <g class="ring-line" stroke-width="1.4" stroke-linecap="round">
      <line x1="32"    y1="22" x2="32"   y2="6"  />
      <line x1="40.66" y1="27" x2="54.5" y2="19" />
      <line x1="40.66" y1="37" x2="54.5" y2="45" />
      <line x1="32"    y1="42" x2="32"   y2="58" />
      <line x1="23.34" y1="37" x2="9.5"  y2="45" />
      <line x1="23.34" y1="27" x2="9.5"  y2="19" />
    </g>

    <!-- Idle agent nodes -->
    <circle class="idle" cx="54.5" cy="19" r="3.6" />
    <circle class="idle" cx="54.5" cy="45" r="3.6" />
    <circle class="idle" cx="32"   cy="58" r="3.6" />
    <circle class="idle" cx="9.5"  cy="45" r="3.6" />
    <circle class="idle" cx="9.5"  cy="19" r="3.6" />

    <!-- Highlighted "live" node -->
    <circle class="live" cx="32" cy="6" r="4.2" />

    <!-- Kernel hexagon -->
    <polygon
      class="kernel"
      points="32,22 40.66,27 40.66,37 32,42 23.34,37 23.34,27"
      stroke-width="1"
      stroke-linejoin="round"
    />

    <!-- Inner dot -->
    <circle class="inner-dot" cx="32" cy="32" r="2.6" />
  </g>

  <!-- ============ WORDMARK + TAGLINE ============ -->
  <!-- Positioned to clear the icon's right edge (≈ 24 + 64*2 = 152) plus
       a 24-unit gutter. Uses system sans-serif so this asset doesn't depend
       on web fonts being available in third-party preview environments. -->
  <text
    x="180"
    y="115"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="60"
    font-weight="700"
    letter-spacing="-1"
  >
    <tspan class="word-base">Agent</tspan><tspan class="word-os">OS</tspan>
  </text>
  <text
    x="182"
    y="146"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="2.4"
    class="tagline"
  >CONTROL PLANE FOR AI AGENTS</text>
</svg>
