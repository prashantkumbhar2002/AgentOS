<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AgentOS">
  <!--
    AgentOS favicon. Mirrors the in-app Logo component (src/components/brand/Logo.tsx)
    but cannot read the app's theme state because it's loaded by the browser before
    any JS runs. Adapts via `prefers-color-scheme` so the OS-level theme is honored,
    which is the closest thing browsers expose for tab-icon rendering.

    Color tokens (kept consistent with Logo.tsx Tailwind classes):
      kernel       violet-600 (light) / violet-400 (dark)
      idle agents  violet-500 (both)
      live agent   emerald-500 (light) / emerald-400 (dark)
      connectors   violet-500 @ 55% (both)
      inner dot    background — white in light, near-black in dark
  -->
  <style>
    .kernel    { fill: #7c3aed; stroke: #7c3aed; }
    .idle      { fill: #8b5cf6; }
    .live      { fill: #10b981; }
    .pipe      { stroke: #8b5cf6; stroke-opacity: 0.55; }
    .inner-dot { fill: #ffffff; }

    @media (prefers-color-scheme: dark) {
      .kernel    { fill: #a78bfa; stroke: #a78bfa; }
      .idle      { fill: #a78bfa; }
      .live      { fill: #34d399; }
      .pipe      { stroke: #a78bfa; stroke-opacity: 0.55; }
      .inner-dot { fill: #0a0a0f; }
    }
  </style>

  <!-- Connector lines: kernel vertex → outer agent vertex (drawn first). -->
  <g class="pipe" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="32"    y1="22" x2="32"   y2="6"  />
    <line x1="40.66" y1="27" x2="54.5" y2="19" />
    <line x1="40.66" y1="37" x2="54.5" y2="45" />
    <line x1="32"    y1="42" x2="32"   y2="58" />
    <line x1="23.34" y1="37" x2="9.5"  y2="45" />
    <line x1="23.34" y1="27" x2="9.5"  y2="19" />
  </g>

  <!-- Five idle agent nodes. -->
  <circle class="idle" cx="54.5" cy="19" r="3.6" />
  <circle class="idle" cx="54.5" cy="45" r="3.6" />
  <circle class="idle" cx="32"   cy="58" r="3.6" />
  <circle class="idle" cx="9.5"  cy="45" r="3.6" />
  <circle class="idle" cx="9.5"  cy="19" r="3.6" />

  <!-- One "live" agent node — slightly larger so the cue lands at 16px. -->
  <circle class="live" cx="32" cy="6" r="4.2" />

  <!-- Kernel (control plane) hexagon. -->
  <polygon
    class="kernel"
    points="32,22 40.66,27 40.66,37 32,42 23.34,37 23.34,27"
    stroke-width="1"
    stroke-linejoin="round"
  />

  <!-- Inner dot — inverts on theme to maintain contrast against the kernel. -->
  <circle class="inner-dot" cx="32" cy="32" r="2.6" />
</svg>
